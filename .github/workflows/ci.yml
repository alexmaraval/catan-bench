name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: uv sync --frozen --group dev --group dashboard

      - name: Install catanatron
        run: uv pip install git+https://github.com/bcollazo/catanatron.git

      - name: Run Ruff
        run: uv run ruff check src tests

      - name: Run tests
        run: uv run pytest tests
