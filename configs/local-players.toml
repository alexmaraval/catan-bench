# Ollama (local, no API key required)
# Pull models with: ollama pull <model>

[[players]]
id = "RED"
type = "llm"
#model = "qwen3:4b"
model = "gemma3:1b"
api_base = "http://localhost:11434/v1"
api_key_env = "OLLAMA_API_KEY"
reasoning_enabled = false
timeout_seconds = 300
temperature = 0.6
top_p = 0.95

